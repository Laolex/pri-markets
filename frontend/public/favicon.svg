<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Pri-Markets">
  <rect width="64" height="64" rx="14" fill="#050911"/>
  <rect x="1.25" y="1.25" width="61.5" height="61.5" rx="12.75" fill="none" stroke="#C4993B" stroke-opacity="0.4" stroke-width="1.5"/>
  <!-- yes pool (sealed, pointing up) -->
  <path d="M19 29.5 L32 13 L45 29.5 Z" fill="#DDB84A"/>
  <!-- no pool (sealed, pointing down) -->
